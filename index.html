  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🎂 Happy Birthday Ryan!</title>
  <!-- Confetti library from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffd6e0, #ffb3c6, #ffe0f0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
      text-align: center;
    }

    /* Floating balloons background */
    .balloons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .balloon {
      position: absolute;
      bottom: -150px;
      width: 60px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #fff, #ff4d6d);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
      animation: floatUp 8s infinite ease-in;
      opacity: 0.8;
    }

    .balloon::before {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 20px;
      background: #888;
    }

    .balloon::after {
      content: '';
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 10px solid #ff4d6d;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-110vh) rotate(30deg);
        opacity: 0;
      }
    }

    /* Different balloon colors & delays */
    .balloon:nth-child(2) { background: radial-gradient(circle at 30% 30%, #fff, #6d9eff); left: 15%; animation-delay: 2s; width: 50px; height: 70px; }
    .balloon:nth-child(3) { background: radial-gradient(circle at 30% 30%, #fff, #6dff8c); left: 35%; animation-delay: 4s; width: 70px; height: 90px; }
    .balloon:nth-child(4) { background: radial-gradient(circle at 30% 30%, #fff, #ffea6d); left: 55%; animation-delay: 1s; width: 55px; height: 75px; }
    .balloon:nth-child(5) { background: radial-gradient(circle at 30% 30%, #fff, #ff6db3); left: 75%; animation-delay: 3s; width: 65px; height: 85px; }
    .balloon:nth-child(6) { background: radial-gradient(circle at 30% 30%, #fff, #b86dff); left: 90%; animation-delay: 5s; width: 45px; height: 65px; }

    /* Main content container */
    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
      z-index: 2;
      position: relative;
      border: 2px solid rgba(255,255,255,0.5);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #ff4d6d, #b24592);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subhead {
      font-size: 1.5rem;
      color: #444;
      margin-bottom: 30px;
      font-weight: 300;
    }

    /* CSS-only Cake */
    .cake-container {
      margin: 20px auto 30px;
      position: relative;
      height: 120px;
      display: flex;
      justify-content: center;
    }

    .cake {
      position: relative;
      width: 160px;
    }

    .plate {
      width: 180px;
      height: 20px;
      background: #ddd;
      border-radius: 50%;
      position: absolute;
      bottom: -10px;
      left: -10px;
      box-shadow: 0 8px 10px rgba(0,0,0,0.2);
    }

    .layer-bottom {
      width: 150px;
      height: 40px;
      background: #f4a261;
      border-radius: 10px 10px 0 0;
      position: absolute;
      bottom: 10px;
      left: 5px;
      box-shadow: inset 0 -10px 10px rgba(0,0,0,0.1);
    }

    .layer-middle {
      width: 120px;
      height: 35px;
      background: #e9c46a;
      border-radius: 8px 8px 0 0;
      position: absolute;
      bottom: 50px;
      left: 20px;
      box-shadow: inset 0 -8px 8px rgba(0,0,0,0.1);
    }

    .layer-top {
      width: 90px;
      height: 30px;
      background: #f4a261;
      border-radius: 6px 6px 0 0;
      position: absolute;
      bottom: 85px;
      left: 35px;
      box-shadow: inset 0 -6px 6px rgba(0,0,0,0.1);
    }

    .candle {
      position: absolute;
      bottom: 115px;
      left: 75px;
      width: 10px;
      height: 25px;
      background: #ffb3c6;
      border-radius: 3px 3px 0 0;
    }

    .flame {
      position: absolute;
      top: -15px;
      left: -2px;
      width: 14px;
      height: 20px;
      background: #ff9f1c;
      border-radius: 50% 50% 20% 20%;
      animation: flicker 0.15s infinite alternate;
      box-shadow: 0 0 15px #ff9f1c;
    }

    @keyframes flicker {
      from { transform: scaleY(1) scaleX(1); opacity: 1; }
      to { transform: scaleY(1.1) scaleX(0.9); opacity: 0.8; }
    }

    .sparkles {
      position: absolute;
      top: -25px;
      left: -5px;
      font-size: 20px;
      animation: sparkle 1s infinite;
    }

    @keyframes sparkle {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(0.5); }
    }

    /* Surprise button */
    .surprise-btn {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
      margin-top: 20px;
      letter-spacing: 1px;
      backdrop-filter: blur(10px);
    }

    .surprise-btn:hover {
      background: #ff3355;
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(255, 77, 109, 0.5);
    }

    .hidden-message {
      margin-top: 25px;
      font-size: 1.2rem;
      color: #333;
      background: rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 20px;
      display: none;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confetti-btn {
      background: none;
      border: 2px solid white;
      color: white;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .confetti-btn:hover {
      background: rgba(255,255,255,0.4);
    }

    footer {
      margin-top: 30px;
      color: #555;
      font-size: 0.9rem;
      z-index: 2;
    }
  </style>
</head>
<body>
  <!-- Floating balloons -->
  <div class="balloons">
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
    <div class="balloon"></div>
  </div>

  <div class="card">
    <h1>Happy Birthday Ryan! 🎉</h1>
    <div class="subhead">Tera din, teri masti, tera swag!</div>

    <!-- Cake -->
    <div class="cake-container">
      <div class="cake">
        <div class="plate"></div>
        <div class="layer-bottom"></div>
        <div class="layer-middle"></div>
        <div class="layer-top"></div>
        <div class="candle">
          <div class="flame"></div>
          <div class="sparkles">✨</div>
        </div>
      </div>
    </div>

    <!-- Surprise button -->
    <button class="surprise-btn" id="surpriseBtn">🎁 Surprise Khol!</button>
    <div class="hidden-message" id="hiddenMessage">
      Ryan, tu sirf ek dost nahi, ek feeling hai! 😎<br>
      Tere saath har pal ek celebration jaisa hai. Aaj tera din hai, toh double dhamaal! <br>
      🎈 Happy Birthday, bhai! Stay lit, stay awesome. 🎈
    </div>

    <!-- Manual confetti trigger -->
    <button class="confetti-btn" onclick="launchConfetti()">🎊 Aur Confetti Karo!</button>
  </div>

  <footer>
    Made with ❤️ by your dost Asad  | &copy; <span id="year"></span>
  </footer>

  <script>
    // Auto confetti on page load
    window.addEventListener('load', () => {
      launchConfetti();
      // Set footer year
      document.getElementById('year').textContent = new Date().getFullYear();
    });

    // Confetti function using canvas-confetti
    function launchConfetti() {
      const duration = 2 * 1000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#ff4d6d', '#ffb3c6', '#ffea6d', '#6dff8c', '#6d9eff']
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#ff4d6d', '#ffb3c6', '#ffea6d', '#6dff8c', '#6d9eff']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    }

    // Surprise button click
    const surpriseBtn = document.getElementById('surpriseBtn');
    const hiddenMessage = document.getElementById('hiddenMessage');

    surpriseBtn.addEventListener('click', () => {
      hiddenMessage.style.display = 'block';
      // Extra confetti for surprise
      launchConfetti();
      // Change button text after reveal
      surpriseBtn.textContent = '🎂 Cake kato!';
      surpriseBtn.style.background = '#b24592';
    });
  </script>
</body>
</html>
    
  </body>
  
</html>
